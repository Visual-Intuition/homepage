<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colored Dot Tracking - Human Annotation</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #000000;
      --bg-panel: #14151a;
      --bg-elevated: #1c1d24;
      --border: #2a2b33;
      --text-primary: #e8e9ed;
      --text-secondary: #8b8d97;
      --accent-cyan: #00d4aa;
      --accent-green: #4ade80;
      --accent-red: #f87171;
      --accent-purple: #a78bfa;
      --accent-blue: #60a5fa;
      --canvas-px: min(60vmin, 520px);
      --controls-w: clamp(110px, 14vmin, 160px);
      --btn-font: clamp(12px, 1.5vmin, 16px);
      --btn-pad: clamp(8px, 1.2vmin, 14px);
    }

    html, body { background: var(--bg-dark); }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
      max-width: 600px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .header .task-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .instructions {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      max-width: 600px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    .instructions strong {
      color: var(--text-primary);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .main-area {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-panel);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }

    .canvas-wrapper {
      position: relative;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      align-self: center;
    }

    #canvas {
      display: block;
      cursor: crosshair;
      width: var(--canvas-px);
      height: var(--canvas-px);
      image-rendering: auto;
    }

    .controls {
      width: var(--controls-w);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-section {
      background: var(--bg-elevated);
      border-radius: 8px;
      padding: 12px;
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--btn-font);
      font-weight: 500;
      padding: var(--btn-pad);
      border: 2px solid var(--border);
      border-radius: 6px;
      background: var(--bg-panel);
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }

    .nav-btn:hover {
      background: var(--bg-elevated);
      border-color: var(--text-secondary);
    }

    .nav-btn.plus-z {
      border-color: var(--accent-green);
      color: var(--accent-green);
    }

    .nav-btn.plus-z:hover {
      background: rgba(74, 222, 128, 0.1);
    }

    .nav-btn.minus-z {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    .nav-btn.minus-z:hover {
      background: rgba(248, 113, 113, 0.1);
    }

    .action-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--btn-font);
      font-weight: 600;
      padding: var(--btn-pad);
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
      width: 100%;
    }

    .action-btn.mip {
      background: var(--bg-panel);
      color: var(--accent-purple);
      border-color: var(--accent-purple);
    }

    .action-btn.mip:hover {
      background: rgba(167, 139, 250, 0.1);
    }

    .action-btn.mip.active {
      background: var(--accent-red);
      color: var(--bg-dark);
      border-color: var(--accent-red);
    }

    .action-btn.undo {
      background: var(--bg-panel);
      color: var(--accent-red);
      border-color: var(--accent-red);
    }

    .action-btn.undo:hover {
      background: rgba(248, 113, 113, 0.1);
    }

    .action-btn.done {
      background: var(--accent-cyan);
      color: var(--bg-dark);
      border-color: var(--accent-cyan);
    }

    .action-btn.done:hover {
      filter: brightness(1.1);
    }

    .nav-btn:disabled,
    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .status-bar {
      padding: 12px 16px;
      background: var(--bg-panel);
      border-radius: 8px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-item span {
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Annotator ID input */
    .annotator-section {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .annotator-section label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .annotator-section input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--text-primary);
      width: 200px;
    }

    /* Result display */
    .result-panel {
      display: none;
      background: var(--bg-panel);
      border: 1px solid var(--accent-cyan);
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      max-width: 600px;
      width: 100%;
    }

    .result-panel h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--accent-cyan);
    }

    .result-panel pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: var(--bg-elevated);
      border-radius: 4px;
      padding: 12px;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
      color: var(--text-secondary);
    }

    .result-panel .download-btn {
      margin-top: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      padding: 10px 20px;
      background: var(--accent-cyan);
      color: var(--bg-dark);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .result-panel .download-btn:hover {
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main-area">
      <div class="canvas-wrapper">
        <canvas id="canvas" width="256" height="256"></canvas>
      </div>
      <div class="controls">
        <div class="control-section">
          <div class="nav-buttons">
            <button class="nav-btn plus-z" id="plusZ">+z</button>
            <button class="nav-btn minus-z" id="minusZ">-z</button>
          </div>
        </div>
        <button class="action-btn mip" id="mip">MIP</button>
        <button class="action-btn undo" id="undo">Undo</button>
        <button class="action-btn done" id="done">Done</button>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-item">Z: <span id="zValue">0</span></div>
      <div class="status-item">Points: <span id="ptsValue">0</span></div>
    </div>
  </div>

  <div class="result-panel" id="resultPanel">
    <h3>Submitting your annotation...</h3>
    <p style="font-size:13px; color: var(--text-secondary);">
      One moment. You'll be redirected to your results shortly.
    </p>
  </div>

  <script>
    // =====================================================
    // Task data - injected by generation script
    // =====================================================
    let taskData = null;
    let taskMetadata = null;

    // =====================================================
    // State
    // =====================================================
    let state = {
      z: 0,
      mip: false,
      markers: [],
      numSlices: 16,
      lastAction: null,
      canUndo: false,
      isComplete: false
    };

    const CANVAS_SIZE = 256;

    // =====================================================
    // Click history recording
    // =====================================================
    let clickHistory = [];
    let sessionStartTime = null;

    function recordAction(actionType, actionCoords, extraFields) {
      if (!sessionStartTime) {
        sessionStartTime = Date.now();
      }
      const entry = {
        z: state.z,
        mip: state.mip,
        n_pts: state.markers.length,
        action: actionCoords,
        action_type: actionType,
        timestamp_ms: Date.now() - sessionStartTime,
        ...(extraFields || {})
      };
      clickHistory.push(entry);
    }

    // =====================================================
    // Matrix Utilities (same as original template)
    // =====================================================

    function invertMatrix2x2(m) {
      const a = m[0][0], b = m[0][1];
      const c = m[1][0], d = m[1][1];
      const det = a * d - b * c;
      if (Math.abs(det) < 1e-10) {
        return [[1 / 4, 0], [0, 1 / 4]];
      }
      return [
        [d / det, -b / det],
        [-c / det, a / det]
      ];
    }

    // =====================================================
    // Rendering Functions (same as original template)
    // =====================================================

    function renderSlice(ctx, sample, zMin, zMax, xySize, bgColor) {
      const imageData = ctx.createImageData(xySize, xySize);
      const data = imageData.data;
      const intensityR = new Float32Array(xySize * xySize);
      const intensityG = new Float32Array(xySize * xySize);
      const intensityB = new Float32Array(xySize * xySize);

      for (const pt of sample.points) {
        if (pt.z < zMin || pt.z >= zMax) continue;
        const px = pt.x * xySize;
        const py = pt.y * xySize;
        const cov2d = [
          [pt.covariance[0][0] * xySize * xySize, pt.covariance[0][1] * xySize * xySize],
          [pt.covariance[1][0] * xySize * xySize, pt.covariance[1][1] * xySize * xySize]
        ];
        const covInv = invertMatrix2x2(cov2d);
        const [r, g, b] = pt.color;
        const maxSigma = Math.max(
          Math.sqrt(Math.abs(cov2d[0][0])),
          Math.sqrt(Math.abs(cov2d[1][1]))
        );
        const radius = Math.min(xySize, maxSigma * 4);
        const xStart = Math.max(0, Math.floor(px - radius));
        const xEnd = Math.min(xySize, Math.ceil(px + radius));
        const yStart = Math.max(0, Math.floor(py - radius));
        const yEnd = Math.min(xySize, Math.ceil(py + radius));

        for (let y = yStart; y < yEnd; y++) {
          for (let x = xStart; x < xEnd; x++) {
            const dx = x - px;
            const dy = y - py;
            const dSq = covInv[0][0] * dx * dx +
                        2 * covInv[0][1] * dx * dy +
                        covInv[1][1] * dy * dy;
            const intensity = Math.exp(-0.5 * dSq);
            const idx = y * xySize + x;
            intensityR[idx] = Math.max(intensityR[idx], intensity * r);
            intensityG[idx] = Math.max(intensityG[idx], intensity * g);
            intensityB[idx] = Math.max(intensityB[idx], intensity * b);
          }
        }
      }

      for (let i = 0; i < xySize * xySize; i++) {
        const alpha = Math.max(intensityR[i], intensityG[i], intensityB[i]);
        const finalR = intensityR[i] + bgColor * (1 - alpha);
        const finalG = intensityG[i] + bgColor * (1 - alpha);
        const finalB = intensityB[i] + bgColor * (1 - alpha);
        data[i * 4 + 0] = Math.min(255, Math.round(finalR * 255));
        data[i * 4 + 1] = Math.min(255, Math.round(finalG * 255));
        data[i * 4 + 2] = Math.min(255, Math.round(finalB * 255));
        data[i * 4 + 3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function renderMIP(ctx, sample, xySize, bgColor) {
      const imageData = ctx.createImageData(xySize, xySize);
      const data = imageData.data;
      const intensityR = new Float32Array(xySize * xySize);
      const intensityG = new Float32Array(xySize * xySize);
      const intensityB = new Float32Array(xySize * xySize);

      for (const pt of sample.points) {
        const px = pt.x * xySize;
        const py = pt.y * xySize;
        const cov2d = [
          [pt.covariance[0][0] * xySize * xySize, pt.covariance[0][1] * xySize * xySize],
          [pt.covariance[1][0] * xySize * xySize, pt.covariance[1][1] * xySize * xySize]
        ];
        const covInv = invertMatrix2x2(cov2d);
        const [r, g, b] = pt.color;
        const maxSigma = Math.max(
          Math.sqrt(Math.abs(cov2d[0][0])),
          Math.sqrt(Math.abs(cov2d[1][1]))
        );
        const radius = Math.min(xySize, maxSigma * 4);
        const xStart = Math.max(0, Math.floor(px - radius));
        const xEnd = Math.min(xySize, Math.ceil(px + radius));
        const yStart = Math.max(0, Math.floor(py - radius));
        const yEnd = Math.min(xySize, Math.ceil(py + radius));

        for (let y = yStart; y < yEnd; y++) {
          for (let x = xStart; x < xEnd; x++) {
            const dx = x - px;
            const dy = y - py;
            const dSq = covInv[0][0] * dx * dx +
                        2 * covInv[0][1] * dx * dy +
                        covInv[1][1] * dy * dy;
            const intensity = Math.exp(-0.5 * dSq);
            const idx = y * xySize + x;
            intensityR[idx] = Math.max(intensityR[idx], intensity * r);
            intensityG[idx] = Math.max(intensityG[idx], intensity * g);
            intensityB[idx] = Math.max(intensityB[idx], intensity * b);
          }
        }
      }

      for (let i = 0; i < xySize * xySize; i++) {
        const alpha = Math.max(intensityR[i], intensityG[i], intensityB[i]);
        const finalR = intensityR[i] + bgColor * (1 - alpha);
        const finalG = intensityG[i] + bgColor * (1 - alpha);
        const finalB = intensityB[i] + bgColor * (1 - alpha);
        data[i * 4 + 0] = Math.min(255, Math.round(finalR * 255));
        data[i * 4 + 1] = Math.min(255, Math.round(finalG * 255));
        data[i * 4 + 2] = Math.min(255, Math.round(finalB * 255));
        data[i * 4 + 3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function getMarkerColor(bgColor) {
      return bgColor < 0.5 ? [255, 255, 255] : [0, 0, 0];
    }

    function drawMarkers(ctx, markers, currentZ, bgColor, numSlices) {
      const markerColor = getMarkerColor(bgColor);
      const colorStr = `rgb(${markerColor[0]}, ${markerColor[1]}, ${markerColor[2]})`;

      for (const [mx, my, mz] of markers) {
        const px = mx * CANVAS_SIZE;
        const py = my * CANVAS_SIZE;
        const zDiff = Math.abs(currentZ - mz);
        let radius;
        let filled = false;
        if (zDiff === 0) {
          radius = 8;
        } else if (zDiff === 1) {
          radius = 4;
        } else {
          radius = 2;
          filled = true;
        }

        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        if (filled) {
          ctx.fillStyle = colorStr;
          ctx.fill();
        } else {
          ctx.strokeStyle = colorStr;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
    }

    function drawMarkersOnMIP(ctx, markers, bgColor) {
      const markerColor = getMarkerColor(bgColor);
      const colorStr = `rgb(${markerColor[0]}, ${markerColor[1]}, ${markerColor[2]})`;

      if (markers.length >= 2) {
        ctx.strokeStyle = colorStr;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(markers[0][0] * CANVAS_SIZE, markers[0][1] * CANVAS_SIZE);
        for (let i = 1; i < markers.length; i++) {
          ctx.lineTo(markers[i][0] * CANVAS_SIZE, markers[i][1] * CANVAS_SIZE);
        }
        ctx.stroke();
      }

      for (const [mx, my, mz] of markers) {
        const px = mx * CANVAS_SIZE;
        const py = my * CANVAS_SIZE;
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.strokeStyle = colorStr;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // =====================================================
    // Main Render Function
    // =====================================================

    function render() {
      if (!taskData) return;

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const bgColor = taskData.bg_color || 0.3;

      if (state.mip) {
        renderMIP(ctx, taskData, CANVAS_SIZE, bgColor);
        drawMarkersOnMIP(ctx, state.markers, bgColor);
      } else {
        const zMin = state.z / state.numSlices;
        const zMax = (state.z + 1) / state.numSlices;
        renderSlice(ctx, taskData, zMin, zMax, CANVAS_SIZE, bgColor);
        drawMarkers(ctx, state.markers, state.z, bgColor, state.numSlices);
      }

      document.getElementById('zValue').textContent = state.z;
      document.getElementById('ptsValue').textContent = state.markers.length;
      document.getElementById('mip').classList.toggle('active', state.mip);
      updateButtonStates();
    }

    function updateButtonStates() {
      document.getElementById('plusZ').disabled = state.z >= state.numSlices - 1;
      document.getElementById('minusZ').disabled = state.z <= 0;
      document.getElementById('undo').disabled = state.markers.length === 0;
    }

    // =====================================================
    // Interactive event handlers with recording
    // =====================================================

    function initInteractive() {
      document.getElementById('plusZ').onclick = (e) => {
        if (state.isComplete || state.z >= state.numSlices - 1) return;
        const rect = e.target.getBoundingClientRect();
        const clickX = e.clientX - rect.left + rect.left;
        const clickY = e.clientY - rect.top + rect.top;
        recordAction('+z_1', [e.clientX, e.clientY]);
        state.z++;
        render();
      };

      document.getElementById('minusZ').onclick = (e) => {
        if (state.isComplete || state.z <= 0) return;
        recordAction('-z_1', [e.clientX, e.clientY]);
        state.z--;
        render();
      };

      document.getElementById('mip').onclick = (e) => {
        if (state.isComplete) return;
        recordAction('mip', [e.clientX, e.clientY]);
        state.mip = !state.mip;
        render();
      };

      document.getElementById('canvas').onclick = (e) => {
        if (state.isComplete || state.mip) return;

        const rect = e.target.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;

        if (x < 0 || x > 1 || y < 0 || y > 1) return;

        const newMarker = [x, y, state.z];
        state.markers.push(newMarker);
        state.canUndo = true;

        recordAction('place', [x * CANVAS_SIZE, y * CANVAS_SIZE], {
          canvas_x_normalized: x,
          canvas_y_normalized: y,
          marker_z: state.z
        });

        render();
      };

      document.getElementById('undo').onclick = (e) => {
        if (state.isComplete || state.markers.length === 0) return;
        const removed = state.markers.pop();
        recordAction('undo', [e.clientX, e.clientY], {
          removed_marker: removed
        });
        render();
      };

      document.getElementById('done').onclick = (e) => {
        if (state.isComplete) return;
        recordAction('done', [e.clientX, e.clientY]);
        state.isComplete = true;
        render();
        showResults();
      };
    }

    // =====================================================
    // Results
    // =====================================================

    function showResults() {
      const annotatorId = 'anonymous';
      const timestamp = new Date().toISOString();

      const result = {
        task_id: taskMetadata ? taskMetadata.task_id : null,
        task_name: taskMetadata ? `${taskMetadata.group}/${taskMetadata.name}` : null,
        n_ground_truth_points: taskMetadata ? taskMetadata.n_points : null,
        annotator_id: annotatorId,
        timestamp: timestamp,
        session_duration_ms: Date.now() - sessionStartTime,
        n_markers_placed: state.markers.length,
        markers: state.markers.slice(),
        num_slices: state.numSlices,
        click_history: clickHistory,
        n_total_actions: clickHistory.length,
      };

      window.parent.postMessage({ type: 'annotation_complete', payload: result }, '*');
    }

    // =====================================================
    // Initialization
    // =====================================================

    document.addEventListener('DOMContentLoaded', function() {
      initInteractive();
      if (taskData) {
        render();
      }
    });
